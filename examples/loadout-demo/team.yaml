name: loadout-demo
description: "Demonstrates loadouts — roles bind to named and inline loadouts, inheritance composes capabilities/MCP/permissions."
version: 1
roles:
  - planner
  - implementer
  - reviewer

topology:
  root:
    role: planner
    prompt: prompts/planner.md
  spawn_rules:
    planner: [implementer, reviewer]
    implementer: []
    reviewer: []

# Optional team-level MCP install specs. Advisory — consumers decide whether
# to install. Shape matches the Claude Code / Cursor / Windsurf `mcpServers`
# format with openteams-specific extensions (`ref`, `description`, `disabled`).
mcp_providers:
  ast-grep:
    command: npx
    args: [ast-grep-mcp]
    description: "Structural code search and rewriting"

  chrome-devtools:
    command: npx
    args: [chrome-devtools-mcp]
    description: "Browser automation via Chrome DevTools Protocol"

  filesystem:
    command: npx
    args: [filesystem-mcp]
    description: "File read/write with path scoping"

  secrets-scanner:
    ref: "@openhive/secrets-scanner"
    description: "Consumer-resolved symbolic reference"

communication:
  enforcement: permissive
  channels:
    work_events:
      description: "Plan → implementation → review lifecycle"
      signals: [PLAN_READY, WORK_DONE, REVIEW_PASSED, REVIEW_FAILED]
  subscriptions:
    implementer:
      - channel: work_events
        signals: [PLAN_READY]
    reviewer:
      - channel: work_events
        signals: [WORK_DONE]
  emissions:
    planner: [PLAN_READY]
    implementer: [WORK_DONE]
    reviewer: [REVIEW_PASSED, REVIEW_FAILED]
