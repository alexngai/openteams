name: security-auditor
description: "Security-focused extension of code-reviewer. Adds OWASP skills and secrets-detection tooling."
extends: code-reviewer
skills:
  profile: security-engineer
  include:
    - owasp-top-10
    - secrets-detection
capabilities_add:
  - exec.test
# Mix of scope references and refs:
#   - chrome-devtools: tool allowlist (key with array value)
#   - secrets-scanner: symbolic ref, consumer resolves to an install spec
mcp_servers:
  - chrome-devtools: [navigate, screenshot, get_page_text]
  - ref: "@openhive/secrets-scanner"
permissions:
  allow:
    - "Bash(npm audit:*)"
  deny:
    - "Bash(curl *:*)"
prompt_addendum: |
  ## Security Focus

  Prioritize: authn/authz gaps, injection vectors, exposed secrets,
  insecure deserialization, misconfigured CORS/CSP.
