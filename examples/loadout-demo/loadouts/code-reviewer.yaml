name: code-reviewer
description: "Baseline loadout for any role that reads code and comments on it."
skills:
  profile: code-reviewer
  include:
    - review-style-guide
  max_tokens: 30000
capabilities:
  - file.read
  - git.diff
  - codebase.search
# Scope declaration — references servers from the team's base set
# (team.yaml:mcp_providers or whatever the consumer has installed).
# `ast-grep` as a bare string = full access to that server's tools.
mcp_servers:
  - ast-grep
permissions:
  allow:
    - "Read(**)"
    - "Bash(git diff:*)"
  deny:
    - "Bash(git push:*)"
    - "Bash(rm -rf:*)"
prompt_addendum: |
  ## Review Mindset

  - Read before you judge.
  - Cite line numbers in feedback.
  - Prefer specific questions over vague suggestions.
