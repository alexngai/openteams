name: implementer
description: "Write-path loadout with test execution."
skills:
  profile: software-engineer
capabilities:
  - file.read
  - file.write
  - codebase.search
  - exec.test
  - exec.run
# Scope with an object-form entry showing both tools and exclude:
#   ast-grep: full access
#   filesystem: allow read + write + search, but deny destructive ops
mcp_servers:
  - ast-grep
  - filesystem:
      tools: [read_file, write_file, list_dir, search]
      exclude: [shell_exec]
permissions:
  allow:
    - "Read(**)"
    - "Write(src/**)"
    - "Bash(npm test:*)"
    - "Bash(npm run typecheck:*)"
  deny:
    - "Bash(git push:*)"
    - "Write(.env)"
    - "Write(**/secrets/**)"
prompt_addendum: |
  ## Implementation Mindset

  - Match existing patterns in the file you're editing.
  - Run tests after substantive changes, before claiming done.
