name: bmad-method
description: "BMAD Method — full agile development team with 10 specialized agents across 4 phases (analysis, planning, solutioning, implementation) plus a quick-flow lane"
version: 1
roles:
  - master
  - analyst
  - pm
  - ux-designer
  - architect
  - scrum-master
  - developer
  - qa
  - tech-writer
  - quick-flow-dev

topology:
  root:
    role: master
    prompt: prompts/master.md
  companions:
    - role: analyst
      prompt: prompts/analyst.md
    - role: pm
      prompt: prompts/pm.md
    - role: ux-designer
      prompt: prompts/ux-designer.md
    - role: architect
      prompt: prompts/architect.md
    - role: scrum-master
      prompt: prompts/scrum-master.md
  spawn_rules:
    master: [analyst, pm, ux-designer, architect, scrum-master, developer, qa, tech-writer, quick-flow-dev]
    scrum-master: [developer, qa, tech-writer]
    pm: [ux-designer]
    analyst: []
    ux-designer: []
    architect: []
    developer: []
    qa: []
    tech-writer: []
    quick-flow-dev: []

communication:
  enforcement: audit

  channels:
    phase_transitions:
      description: "Signals when a development phase completes and the next can begin"
      signals: [ANALYSIS_COMPLETE, PLANNING_COMPLETE, SOLUTIONING_COMPLETE, IMPLEMENTATION_COMPLETE]
    artifact_ready:
      description: "Signals when a key artifact is produced and available for downstream consumers"
      signals: [BRIEF_READY, PRD_READY, UX_SPEC_READY, ARCHITECTURE_READY, STORIES_READY, READINESS_GATE_PASSED]
    sprint_events:
      description: "Sprint lifecycle events during implementation phase"
      signals: [SPRINT_STARTED, STORY_READY, STORY_COMPLETE, REVIEW_PASSED, REVIEW_FAILED, SPRINT_COMPLETE]
    quality_events:
      description: "Quality gates and test results"
      signals: [TESTS_PASSED, TESTS_FAILED, DOCS_UPDATED]

  subscriptions:
    master:
      - channel: phase_transitions
      - channel: artifact_ready
      - channel: sprint_events
      - channel: quality_events
    pm:
      - channel: phase_transitions
        signals: [ANALYSIS_COMPLETE]
      - channel: artifact_ready
        signals: [BRIEF_READY]
    ux-designer:
      - channel: artifact_ready
        signals: [PRD_READY]
    architect:
      - channel: artifact_ready
        signals: [PRD_READY, UX_SPEC_READY]
    scrum-master:
      - channel: artifact_ready
        signals: [ARCHITECTURE_READY, STORIES_READY, READINESS_GATE_PASSED]
      - channel: sprint_events
      - channel: quality_events
    developer:
      - channel: sprint_events
        signals: [STORY_READY, REVIEW_FAILED]
    qa:
      - channel: sprint_events
        signals: [STORY_COMPLETE]
    tech-writer:
      - channel: artifact_ready
      - channel: sprint_events
        signals: [STORY_COMPLETE, SPRINT_COMPLETE]

  emissions:
    analyst: [ANALYSIS_COMPLETE, BRIEF_READY]
    pm: [PLANNING_COMPLETE, PRD_READY, STORIES_READY, READINESS_GATE_PASSED]
    ux-designer: [UX_SPEC_READY]
    architect: [SOLUTIONING_COMPLETE, ARCHITECTURE_READY]
    scrum-master: [SPRINT_STARTED, STORY_READY, SPRINT_COMPLETE]
    developer: [STORY_COMPLETE]
    qa: [TESTS_PASSED, TESTS_FAILED]
    tech-writer: [DOCS_UPDATED]
    quick-flow-dev: [STORY_COMPLETE]

  routing:
    peers:
      # Phase handoffs
      - from: analyst
        to: pm
        via: direct
        signals: [BRIEF_READY]
      - from: pm
        to: architect
        via: direct
        signals: [PRD_READY]
      - from: ux-designer
        to: architect
        via: direct
        signals: [UX_SPEC_READY]
      # Implementation coordination
      - from: scrum-master
        to: developer
        via: direct
        signals: [STORY_READY]
      - from: developer
        to: scrum-master
        via: direct
        signals: [STORY_COMPLETE]
      - from: developer
        to: qa
        via: direct
      # Review loop
      - from: architect
        to: developer
        via: direct
        signals: [REVIEW_PASSED, REVIEW_FAILED]

# Extension: BMAD-specific workflow metadata (stored, not interpreted by openteams)
bmad:
  phases:
    analysis:
      lead: analyst
      optional: true
      workflows: [brainstorm-project, market-research, domain-research, technical-research, create-product-brief]
    planning:
      lead: pm
      parallel: [ux-designer]
      workflows: [create-prd, validate-prd, create-ux-design]
    solutioning:
      lead: architect
      workflows: [create-architecture, create-epics-and-stories, implementation-readiness]
    implementation:
      orchestrator: scrum-master
      executors: [developer, qa, tech-writer]
      workflows: [sprint-planning, create-story, dev-story, code-review, automate-tests]
  quick_flow:
    agent: quick-flow-dev
    parallel_to_all: true
    workflows: [quick-spec, quick-dev, code-review]
  party_mode:
    orchestrator: master
    description: "Multi-agent collaborative discussion for big decisions, brainstorming, and retrospectives"
