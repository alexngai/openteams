name: security-audit
description: "Fan-out/fan-in security scanning pipeline — three parallel scanners (dependencies, code analysis, secrets) feed into a prioritizer, then linear remediation with verification and PR creation."
version: 1
roles:
  - prioritizer
  - dep-scanner
  - code-analyzer
  - secrets-scanner
  - fixer
  - verifier
  - pr-creator

topology:
  root:
    role: prioritizer
    prompt: prompts/prioritize.md
  companions:
    - role: dep-scanner
      prompt: prompts/dependency-audit.md
    - role: code-analyzer
      prompt: prompts/code-analysis.md
    - role: secrets-scanner
      prompt: prompts/secrets-scan.md
  spawn_rules:
    prioritizer: [fixer]
    dep-scanner: []
    code-analyzer: []
    secrets-scanner: []
    fixer: [verifier]
    verifier: [pr-creator]
    pr-creator: []

communication:
  enforcement: strict

  channels:
    scanning_results:
      description: "Parallel scanner completion signals — prioritizer waits for all three"
      signals: [DEPS_SCANNED, CODE_ANALYZED, SECRETS_SCANNED]
    prioritization_events:
      description: "Consolidated finding prioritization"
      signals: [FINDINGS_PRIORITIZED, NO_FINDINGS]
    remediation_events:
      description: "Fix application and verification lifecycle"
      signals: [REMEDIATION_APPLIED, REMEDIATION_FAILED, REMEDIATION_VERIFIED, REMEDIATION_NEEDS_REWORK]
    pr_events:
      description: "Audit report PR creation"
      signals: [AUDIT_PR_CREATED]

  subscriptions:
    prioritizer:
      - channel: scanning_results
    dep-scanner: []
    code-analyzer: []
    secrets-scanner: []
    fixer:
      - channel: prioritization_events
        signals: [FINDINGS_PRIORITIZED]
    verifier:
      - channel: remediation_events
        signals: [REMEDIATION_APPLIED]
    pr-creator:
      - channel: remediation_events
        signals: [REMEDIATION_VERIFIED]

  emissions:
    dep-scanner: [DEPS_SCANNED]
    code-analyzer: [CODE_ANALYZED]
    secrets-scanner: [SECRETS_SCANNED]
    prioritizer: [FINDINGS_PRIORITIZED, NO_FINDINGS]
    fixer: [REMEDIATION_APPLIED, REMEDIATION_FAILED]
    verifier: [REMEDIATION_VERIFIED, REMEDIATION_NEEDS_REWORK]
    pr-creator: [AUDIT_PR_CREATED]

  routing:
    peers:
      # Fan-in: scanners → prioritizer
      - from: dep-scanner
        to: prioritizer
        via: direct
        signals: [DEPS_SCANNED]
      - from: code-analyzer
        to: prioritizer
        via: direct
        signals: [CODE_ANALYZED]
      - from: secrets-scanner
        to: prioritizer
        via: direct
        signals: [SECRETS_SCANNED]
      # Linear: prioritizer → fixer → verifier → pr-creator
      - from: prioritizer
        to: fixer
        via: direct
        signals: [FINDINGS_PRIORITIZED]
      - from: fixer
        to: verifier
        via: direct
        signals: [REMEDIATION_APPLIED]
      - from: verifier
        to: pr-creator
        via: direct
        signals: [REMEDIATION_VERIFIED]
